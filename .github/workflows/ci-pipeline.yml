name: Production CI/CD Pipeline

on:
  push: 
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: npm install
    - name: Run Unit Tests # <--- NEW STEP  
      run: npm test

  build-and-push:
    needs: test # <--- This job ONLY runs if the "test" job passes!
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/electricity-api:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/electricity-api:latest
          echo "Production image built and pushed to Docker Hub successfully."